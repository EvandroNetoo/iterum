# ============================================================
# Tema IFES — DaisyUI "ifes"
# base-100:#c8edc5  base-200:#9bde97  base-300:#68c662
# base-content:#0c270c  primary:#359830  secondary:#c90c0f
# border:2px  radius:8px
# ============================================================

# --- Variáveis de paleta ---
@base100        = #c8edc5
@base200        = #9bde97
@base300        = #68c662
@baseContent    = #0c270c
@primary        = #359830
@primaryContent = #ffffff
@secondary      = #c90c0f
@accent         = #000000
@neutral        = #ffffff
@neutralContent = #000000
@info           = #2563eb
@success        = #16a34a
@warning        = #d97706
@error          = #dc2626

# --- Aliases internos FlatLaf ---
@background           = @base100
@foreground           = @baseContent
@accentColor          = @primary
@selectionBackground  = @base200
@selectionForeground  = @baseContent
@disabledForeground   = #5a7a59

# --- Arredondamento e borda globais (0.5rem = 8px, border: 2px) ---
Component.arc         = 8
Component.borderWidth = 2
Component.focusColor              = @primary
Component.focusWidth              = 2
Component.innerFocusWidth         = 0
Component.error.borderColor       = @error
Component.warning.borderColor     = @warning

# --- Painéis e janelas ---
Panel.background                  = @background
RootPane.background               = @background
SplitPane.background              = @background
TabbedPane.background             = @background
TabbedPane.foreground             = @foreground
TabbedPane.selectedBackground     = @base200
TabbedPane.focusColor             = @primary
TabbedPane.hoverColor             = @base200
TabbedPane.underlineColor         = @primary
TabbedPane.contentAreaColor       = @background

# --- Labels ---
Label.foreground                  = @foreground

# --- Botões ---
Button.background                 = @base200
Button.foreground                 = @baseContent
Button.hoverBackground            = @base300
Button.pressedBackground          = @primary
Button.focusedBackground          = @base300
Button.selectedBackground         = @primary
Button.selectedForeground         = @primaryContent
Button.disabledBackground         = @base100
Button.disabledForeground         = @disabledForeground
Button.borderColor                = @base300
Button.disabledBorderColor        = @base200
Button.focusedBorderColor         = @primary
Button.arc                        = 8
Button.borderWidth                = 2

ToggleButton.background           = @base200
ToggleButton.foreground           = @baseContent
ToggleButton.hoverBackground      = @base300
ToggleButton.pressedBackground    = @primary
ToggleButton.selectedBackground   = @primary
ToggleButton.selectedForeground   = @primaryContent
ToggleButton.arc                  = 8

# --- Campos de texto ---
TextField.background              = @neutral
TextField.foreground              = @neutralContent
TextField.caretForeground         = @neutralContent
TextField.selectionBackground     = @base200
TextField.selectionForeground     = @baseContent
TextField.placeholderForeground   = #7a9e79
TextField.borderColor             = @base300
TextField.focusedBorderColor      = @primary

TextArea.background               = @neutral
TextArea.foreground               = @neutralContent
TextArea.caretForeground          = @neutralContent
TextArea.selectionBackground      = @base200
TextArea.selectionForeground      = @baseContent

FormattedTextField.background          = @neutral
FormattedTextField.foreground          = @neutralContent
FormattedTextField.selectionBackground = @base200
FormattedTextField.selectionForeground = @baseContent
FormattedTextField.focusedBorderColor  = @primary

PasswordField.background          = @neutral
PasswordField.foreground          = @neutralContent
PasswordField.focusedBorderColor  = @primary

# --- ComboBox ---
ComboBox.background               = @neutral
ComboBox.foreground               = @neutralContent
ComboBox.selectionBackground      = @base200
ComboBox.selectionForeground      = @baseContent
ComboBox.focusedBorderColor       = @primary
ComboBox.arc                      = 8

# --- Spinner ---
Spinner.background                = @neutral
Spinner.foreground                = @neutralContent
Spinner.focusedBorderColor        = @primary
Spinner.arc                       = 8

# --- CheckBox ---
CheckBox.foreground                          = @foreground
CheckBox.icon.background                     = @neutral
CheckBox.icon.borderColor                    = @base300
CheckBox.icon.focusedBorderColor             = @primary
CheckBox.icon.hoverBorderColor               = @primary
CheckBox.icon.selectedBackground             = @primary
CheckBox.icon.selectedBorderColor            = @primary
CheckBox.icon.checkmarkColor                 = @primaryContent
CheckBox.icon.disabledBackground             = @base100
CheckBox.icon.disabledBorderColor            = @base200
CheckBox.icon.disabledCheckmarkColor         = @disabledForeground
CheckBox.icon.arc                            = 4

# --- RadioButton ---
RadioButton.foreground                       = @foreground
RadioButton.icon.background                  = @neutral
RadioButton.icon.borderColor                 = @base300
RadioButton.icon.focusedBorderColor          = @primary
RadioButton.icon.hoverBorderColor            = @primary
RadioButton.icon.selectedBackground          = @primary
RadioButton.icon.selectedBorderColor         = @primary
RadioButton.icon.checkmarkColor              = @primaryContent

# --- Listas ---
List.background                   = @neutral
List.foreground                   = @neutralContent
List.selectionBackground          = @base200
List.selectionForeground          = @baseContent
List.hoverBackground              = @base100

# --- Tabelas ---
Table.background                  = @neutral
Table.foreground                  = @neutralContent
Table.selectionBackground         = @base200
Table.selectionForeground         = @baseContent
Table.alternateRowColor           = @base100
Table.gridColor                   = @base200
TableHeader.background            = @base200
TableHeader.foreground            = @baseContent
TableHeader.separatorColor        = @base300
TableHeader.hoverBackground       = @base300

# --- Árvores ---
Tree.background                   = @neutral
Tree.foreground                   = @neutralContent
Tree.selectionBackground          = @base200
Tree.selectionForeground          = @baseContent

# --- ScrollBars ---
ScrollBar.track                   = @background
ScrollBar.thumb                   = @base300
ScrollBar.hoverThumbColor         = @primary
ScrollBar.pressedThumbColor       = @primary
ScrollBar.thumbArc                = 999
ScrollBar.width                   = 10
ScrollPane.background             = @background

# --- ProgressBar ---
ProgressBar.background            = @base200
ProgressBar.foreground            = @primary
ProgressBar.selectionForeground   = @primaryContent
ProgressBar.selectionBackground   = @primary
ProgressBar.arc                   = 0

# --- Slider ---
Slider.trackColor                 = @base200
Slider.thumbColor                 = @primary
Slider.focusedThumbBorderColor    = @primary
Slider.hoverThumbColor            = @base300

# --- Menus ---
MenuBar.background                = @base200
MenuBar.foreground                = @baseContent
MenuBar.selectionBackground       = @base300
MenuBar.selectionForeground       = @baseContent
Menu.background                   = @base100
Menu.foreground                   = @baseContent
Menu.selectionBackground          = @primary
Menu.selectionForeground          = @primaryContent
MenuItem.background               = @base100
MenuItem.foreground               = @baseContent
MenuItem.selectionBackground      = @primary
MenuItem.selectionForeground      = @primaryContent
MenuItem.acceleratorForeground    = #5a7a59
MenuItem.acceleratorSelectionForeground = @primaryContent
CheckBoxMenuItem.selectionBackground    = @primary
CheckBoxMenuItem.selectionForeground    = @primaryContent
RadioButtonMenuItem.selectionBackground = @primary
RadioButtonMenuItem.selectionForeground = @primaryContent
PopupMenu.background              = @base100
PopupMenu.foreground              = @baseContent
PopupMenu.borderColor             = @base300
Separator.foreground              = @base300

# --- ToolBar ---
ToolBar.background                = @base200
ToolBar.foreground                = @baseContent

# --- ToolTip ---
ToolTip.background                = @base200
ToolTip.foreground                = @baseContent

# --- TitleBar ---
TitleBar.background               = @base200
TitleBar.foreground               = @baseContent
TitleBar.inactiveBackground       = @base100
TitleBar.inactiveForeground       = @disabledForeground
TitleBar.buttonHoverBackground    = @base300
TitleBar.buttonPressedBackground  = @primary
TitleBar.closeHoverBackground     = @secondary
TitleBar.closeHoverForeground     = #ffffff
TitleBar.closePressedBackground   = #a00a0c
TitleBar.closePressedForeground   = #ffffff

# --- InternalFrame ---
InternalFrame.activeTitleBackground   = @primary
InternalFrame.activeTitleForeground   = @primaryContent
InternalFrame.inactiveTitleBackground = @base200
InternalFrame.inactiveTitleForeground = @baseContent
Desktop.background                    = @base100


