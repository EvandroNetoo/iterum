services:
  db:
    image: postgres:16-alpine
    container_name: iterum-postgres
    environment:
      POSTGRES_DB: iterum
      POSTGRES_USER: iterum
      POSTGRES_PASSWORD: iterum
    ports:
      - "5432:5432"
    volumes:
      - iterum_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iterum -d iterum"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  iterum_pgdata:
